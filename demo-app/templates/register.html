{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container" style="max-width:420px;">
  <div class="card" style="margin-top:40px;">
    <h2 id="register-heading" style="font-weight:700;font-size:22px;margin-bottom:4px;">Create account</h2>
    <p style="color:#888;font-size:13px;margin-bottom:24px;">Join ShopDemo today</p>
    {% if error %}
    <div class="alert alert-error" id="error-message">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success" id="success-message">{{ success }}</div>
    {% endif %}
    <form method="POST" action="/register" id="register-form">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required />
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="register-btn">Create account</button>
    </form>
    <p style="margin-top:16px;text-align:center;font-size:13px;color:#888;">
      Already have an account? <a href="/login" style="color:#0a84ff;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
